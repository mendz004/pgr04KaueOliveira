<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link rel="stylesheet" href="../../infraestructure/assets/css/elements.css">
    <link rel="stylesheet" href="../../infraestructure/assets/css/fonts.css">
    <link rel="shortcut icon" href="../../infraestructure/assets/images/Favicon.png" type="image/png">


</head>

<body>

    <main>
                <!-- Formulario de Cadastro -->
        <h2 class="subtitulo">Crie sua conta</h2>

        <div class="sign-in">

            <form action="http://localhost/ProjetoPrg04" method="post">

                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

                <label for="sobrenome">Sobrenome:</label>
                <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email">

                <label for="dataNascimento">Data de Nascimento:</label>
                <input type="date" id="dataNascimento" name="dataNascimento">

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Crie sua senha">
                
                <label for="confirmarSenha">Confirmar Senha:</label>
                <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirme sua senha">

                <button class="btn btn-1" type="submit">Criar Conta</button>


            </form>


        </div>

    </main>

    <footer>
        <p>&copy; 2026 Gestor de Finanças Pessoais. Todos os direitos reservados.</p>
        <p>Desenvolvido para ajudar você a controlar suas finanças.</p>
    </footer>

</body>

</html>
